name: Build portable apps

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: VaultApp-windows-x64
            args: -platform windows/amd64
          - os: macos-15-intel
            artifact: VaultApp-macos-intel
            args: -platform darwin/amd64
          - os: macos-15
            artifact: VaultApp-macos-arm64
            args: -platform darwin/arm64
          - os: ubuntu-24.04
            artifact: VaultApp-linux-x64
            args: -platform linux/amd64 -tags webkit2_41
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Install Linux build libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install pinned Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build
        shell: bash
        run: wails build ${{ matrix.args }} -clean
      - name: Stage portable layout
        shell: bash
        run: |
          mkdir -p package/data/logs package/data/cache package/assets/models package/assets/thumbnails
          touch package/.vaultapp
          cp -R build/bin/* package/
          cp README.md package/
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: package
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create archives
        run: for dir in artifacts/*; do tar -czf "$(basename "$dir").tar.gz" -C "$dir" .; done
      - uses: softprops/action-gh-release@v2
        with:
          files: '*.tar.gz'
          generate_release_notes: true
