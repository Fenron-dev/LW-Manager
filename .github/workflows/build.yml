name: Build portable apps

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: VaultApp-windows-x64
            args: -platform windows/amd64
          - os: macos-15-intel
            artifact: VaultApp-macos-intel
            args: -platform darwin/amd64
          - os: macos-15
            artifact: VaultApp-macos-arm64
            args: -platform darwin/arm64
          - os: ubuntu-24.04
            artifact: VaultApp-linux-x64
            args: -platform linux/amd64 -tags webkit2_41
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Install Linux build libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install pinned Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Determine application version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=$(sed -n 's/^var appVersion = "\([^"]*\)"$/\1/p' app.go)" >> "$GITHUB_ENV"
          fi
      - name: Build
        shell: bash
        run: wails build ${{ matrix.args }} -clean -ldflags "-X main.appVersion=${APP_VERSION}"
      - name: Stage portable layout
        shell: bash
        run: |
          mkdir -p package/data/logs package/data/cache package/assets/models package/assets/thumbnails
          touch package/.vaultapp
          cp -R build/bin/* package/
          cp README.md package/
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            cp scripts/macos-start.command package/VaultApp-starten.command
            chmod +x package/VaultApp-starten.command
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: package
          include-hidden-files: true
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create archives
        shell: bash
        run: |
          mkdir release
          for dir in artifacts/*; do
            name="$(basename "$dir")"
            if [[ "$name" == *windows* ]]; then
              (cd "$dir" && zip -qr "$GITHUB_WORKSPACE/release/$name.zip" .)
            else
              tar -czf "release/$name.tar.gz" -C "$dir" .
            fi
          done
          (cd release && sha256sum VaultApp-* > SHA256SUMS.txt)
      - uses: softprops/action-gh-release@v2
        with:
          name: VaultApp ${{ github.ref_name }}
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
