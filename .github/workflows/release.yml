name: Publish stable release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Stabile Version ohne v, z. B. 0.50.0'
        required: true
        type: string
      confirmation:
        description: 'Zur Bestätigung exakt RELEASE eingeben'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Validate explicit release request
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_CONFIRMATION: ${{ inputs.confirmation }}
        run: bash scripts/check-release-version.sh "$RELEASE_VERSION" "$RELEASE_CONFIRMATION"
      - name: Verify source
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
          go mod tidy
          go test -tags webkit2_41 ./...
          test -z "$(gofmt -l .)"
          git diff --exit-code
      - name: Create annotated release tag
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$RELEASE_VERSION" -m "VaultApp v$RELEASE_VERSION"
          git push origin "v$RELEASE_VERSION"
